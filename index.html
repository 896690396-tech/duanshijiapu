<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>段氏家谱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        .header h1 {
            font-size: 2.5em;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .header p { color: #aaa; margin-top: 5px; }
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #ff6b6b; transform: translateY(-2px); }
        .btn-secondary { background: #533483; color: #fff; }
        .btn-secondary:hover { background: #6a4c93; }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            overflow-x: auto;
        }
        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: fit-content;
        }
        .node {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        .node-content {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 2px solid #e94560;
            border-radius: 10px;
            padding: 12px 20px;
            min-width: 100px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }
        .node-content:hover {
            background: linear-gradient(145deg, #e94560, #c73e54);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233,69,96,0.4);
        }
        .node-content.founder {
            border-color: #ffd700;
            background: linear-gradient(145deg, #3a3a5a, #2a2a4a);
        }
        .node-content.founder:hover {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
        }
        .children {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            padding-top: 20px;
        }
        .children::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background: #e94560;
        }
        .children .node::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background: #e94560;
        }
        .children .node::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -10px;
            width: calc(50% + 10px);
            height: 2px;
            background: #e94560;
        }
        .children .node:first-child::after {
            left: 50%;
            width: calc(50% + 10px);
        }
        .children .node:last-child::after {
            left: auto;
            right: 50%;
            width: calc(50% + 10px);
        }
        .children .node:only-child::after {
            display: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #e94560;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: #e94560; margin-bottom: 20px; }
        .member-list { margin-bottom: 15px; }
        .member-item {
            background: #2a2a4a;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .member-item span { cursor: pointer; }
        .member-item span:hover { color: #e94560; }
        .delete-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .form-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #533483;
            border-radius: 5px;
            background: #2a2a4a;
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .form-input:focus { outline: none; border-color: #e94560; }
        .stats {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .stats-value { font-size: 24px; color: #e94560; }
        .empty-msg { color: #888; }
        @media (max-width: 768px) {
            .children { flex-direction: column; gap: 30px; }
            .children::before, .children .node::before, .children .node::after { display: none; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>段氏家谱</h1>
        <p>段氏家族族谱 · 一世祖：段文成</p>
    </div>
    
    <div class="toolbar">
        <button class="btn btn-primary" onclick="showAddMember()">添加家庭成员</button>
        <button class="btn btn-secondary" onclick="exportData()">导出族谱</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">导入族谱</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(this)">
        <button class="btn btn-secondary" onclick="resetData()">重置族谱</button>
    </div>

    <div class="stats">
        <span>家族总人数：</span>
        <span class="stats-value" id="totalCount">0</span>
    </div>

    <div class="container">
        <div class="tree" id="tree"></div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>添加家庭成员</h2>
            <input type="text" id="newMemberName" class="form-input" placeholder="请输入姓名">
            <select id="newMemberParent" class="form-input">
                <option value="">无（添加到根节点）</option>
            </select>
            <div class="form-buttons">
                <button class="btn btn-primary" onclick="addMember()">确认添加</button>
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <h2 id="detailTitle">成员详情</h2>
            <div class="member-list" id="detailList"></div>
            <div class="form-buttons">
                <button class="btn btn-primary" onclick="showAddChild()">添加子女</button>
                <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const defaultData = {
            id: 'root',
            name: '段文成（一世祖）',
            children: [
                { id: '1', name: '段得洪' },
                { id: '2', name: '段得元' },
                { id: '3', name: '段得亨' },
                { 
                    id: '4', 
                    name: '段得利',
                    children: [
                        { 
                            id: '4-1', 
                            name: '段永常',
                            children: [
                                {
                                    id: '4-1-1',
                                    name: '段国维',
                                    children: [
                                        {
                                            id: '4-1-1-1',
                                            name: '段怀仁',
                                            children: [
                                                { id: '4-1-1-1-1', name: '段智学', children: [
                                                    { id: '4-1-1-1-1-1', name: '段文静' },
                                                    { id: '4-1-1-1-1-2', name: '段文楠' }
                                                ]},
                                                { id: '4-1-1-1-2', name: '段智旺' },
                                                { id: '4-1-1-1-3', name: '段智国' },
                                                { id: '4-1-1-1-4', name: '段智杰' }
                                            ]
                                        },
                                        {
                                            id: '4-1-1-2',
                                            name: '段怀义',
                                            children: [
                                                { id: '4-1-1-2-1', name: '段志明' },
                                                { id: '4-1-1-2-2', name: '段志礼' }
                                            ]
                                        },
                                        {
                                            id: '4-1-1-3',
                                            name: '段怀礼',
                                            children: [
                                                { id: '4-1-1-3-1', name: '段志广', children: [{ id: '4-1-1-3-1-1', name: '段连续' }] },
                                                { id: '4-1-1-3-2', name: '段志生', children: [{ id: '4-1-1-3-2-1', name: '段连明' }] },
                                                { id: '4-1-1-3-3', name: '段志富', children: [{ id: '4-1-1-3-3-1', name: '段连新' }] },
                                                { id: '4-1-1-3-4', name: '段志贵', children: [{ id: '4-1-1-3-4-1', name: '段连顺' }] }
                                            ]
                                        },
                                        {
                                            id: '4-1-1-4',
                                            name: '段怀智',
                                            children: [
                                                { id: '4-1-1-4-1', name: '段志安' },
                                                { id: '4-1-1-4-2', name: '段志瑞' },
                                                { id: '4-1-1-4-3', name: '段志庆' }
                                            ]
                                        },
                                        {
                                            id: '4-1-1-5',
                                            name: '段怀朋',
                                            children: [
                                                { id: '4-1-1-5-1', name: '段志春', children: [{ id: '4-1-1-5-1-1', name: '段连昊' }] },
                                                { id: '4-1-1-5-2', name: '段志泽', children: [{ id: '4-1-1-5-2-1', name: '段连赫' }] }
                                            ]
                                        }
                                    ]
                                },
                                { id: '4-2', name: '段永茂' }
                            ]
                        }
                    ]
                },
                { id: '5', name: '段得真' }
            ]
        };

        let currentData = JSON.parse(localStorage.getItem('familyTree')) || JSON.parse(JSON.stringify(defaultData));
        let selectedMember = null;

        function loadData() {
            const saved = localStorage.getItem('familyTree');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    return JSON.parse(JSON.stringify(defaultData));
                }
            }
            return JSON.parse(JSON.stringify(defaultData));
        }

        function saveData(data) {
            localStorage.setItem('familyTree', JSON.stringify(data));
        }

        function countMembers(node) {
            let count = 1;
            if (node.children) {
                for (let child of node.children) {
                    count += countMembers(child);
                }
            }
            return count;
        }

        function flattenMembers(node, list = []) {
            list.push({ id: node.id, name: node.name });
            if (node.children) {
                for (let child of node.children) {
                    flattenMembers(child, list);
                }
            }
            return list;
        }

        function findNode(node, id) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    const found = findNode(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParent(node, childId, parent = null) {
            if (node.children) {
                for (let child of node.children) {
                    if (child.id === childId) {
                        return parent;
                    }
                    const found = findParent(child, childId, child);
                    if (found) return found;
                }
            }
            return null;
        }

        function renderTree(node, container, isRoot = false) {
            const nodeEl = document.createElement('div');
            nodeEl.className = 'node';
            
            const content = document.createElement('div');
            content.className = 'node-content' + (isRoot ? ' founder' : '');
            content.textContent = node.name;
            content.onclick = () => showDetail(node);
            nodeEl.appendChild(content);

            if (node.children && node.children.length > 0) {
                const childrenEl = document.createElement('div');
                childrenEl.className = 'children';
                
                for (let child of node.children) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'node';
                    renderTree(child, childContainer, false);
                    childrenEl.appendChild(childContainer);
                }
                
                nodeEl.appendChild(childrenEl);
            }

            container.appendChild(nodeEl);
        }

        function render() {
            currentData = loadData();
            const tree = document.getElementById('tree');
            tree.innerHTML = '';
            renderTree(currentData, tree, true);
            document.getElementById('totalCount').textContent = countMembers(currentData);
        }

        function showDetail(node) {
            selectedMember = node;
            document.getElementById('detailTitle').textContent = node.name;
            
            const list = document.getElementById('detailList');
            if (node.children && node.children.length > 0) {
                let html = '';
                for (let child of node.children) {
                    html += `<div class="member-item">
                        <span onclick="showDetail(findNode(currentData, '${child.id}'))">${child.name}</span>
                    </div>`;
                }
                list.innerHTML = html;
            } else {
                list.innerHTML = '<p class="empty-msg">暂无后代</p>';
            }
            
            document.getElementById('detailModal').classList.add('active');
        }

        function showAddChild() {
            const name = prompt('请输入子女姓名:');
            if (name && name.trim()) {
                if (!selectedMember.children) {
                    selectedMember.children = [];
                }
                selectedMember.children.push({
                    id: Date.now().toString(),
                    name: name.trim()
                });
                saveData(currentData);
                render();
                showDetail(selectedMember);
            }
        }

        function deleteMember() {
            if (!selectedMember) return;
            if (selectedMember.id === 'root') {
                alert('不能删除祖先');
                return;
            }
            if (confirm('确定删除此成员及其所有后代吗？')) {
                const parent = findParent(currentData, selectedMember.id);
                if (parent && parent.children) {
                    parent.children = parent.children.filter(c => c.id !== selectedMember.id);
                    saveData(currentData);
                    render();
                    closeModal();
                }
            }
        }

        function showAddMember() {
            const select = document.getElementById('newMemberParent');
            select.innerHTML = '<option value="">无（添加到根节点）</option>';
            
            const allMembers = flattenMembers(currentData);
            for (let member of allMembers) {
                const option = document.createElement('option');
                option.value = member.id;
                option.textContent = member.name;
                select.appendChild(option);
            }
            
            document.getElementById('newMemberName').value = '';
            document.getElementById('addModal').classList.add('active');
        }

        function addMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const parentId = document.getElementById('newMemberParent').value;
            
            if (!name) {
                alert('请输入姓名');
                return;
            }

            const newMember = {
                id: Date.now().toString(),
                name: name
            };

            currentData = loadData();

            if (!parentId) {
                if (!currentData.children) {
                    currentData.children = [];
                }
                currentData.children.push(newMember);
            } else {
                const parent = findNode(currentData, parentId);
                if (parent) {
                    if (!parent.children) {
                        parent.children = [];
                    }
                    parent.children.push(newMember);
                }
            }

            saveData(currentData);
            render();
            closeModal();
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('detailModal').classList.remove('active');
            selectedMember = null;
        }

        function exportData() {
            const data = JSON.stringify(currentData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '段氏家谱.json';
            a.click();
        }

        function importData(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.name && data.id) {
                            saveData(data);
                            currentData = data;
                            render();
                            alert('导入成功！');
                        }
                    } catch (err) {
                        alert('文件格式错误');
                    }
                };
                reader.readAsText(file);
            }
        }

        function resetData() {
            if (confirm('确定重置所有数据吗？')) {
                currentData = JSON.parse(JSON.stringify(defaultData));
                saveData(currentData);
                render();
            }
        }

        render();
    </script>
</body>
</html>
